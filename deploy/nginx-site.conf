server {
    listen 80;
    server_name sirens.sccarpsc.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sirens.sccarpsc.org;

    ssl_certificate /etc/letsencrypt/live/sirens.sccarpsc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sirens.sccarpsc.org/privkey.pem;

    client_max_body_size 10M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /opt/sirentracker/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
